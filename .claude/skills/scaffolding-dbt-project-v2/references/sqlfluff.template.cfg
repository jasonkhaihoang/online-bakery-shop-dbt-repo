[sqlfluff]
# Dialect: sparksql is the DEFAULT — do not change it unless the user explicitly
# confirms their endpoint is a Fabric Warehouse (not a Lakehouse SQL endpoint).
# sparksql → Fabric Lakehouse SQL endpoint (default)
# tsql     → Fabric Warehouse endpoint (explicit opt-in only)
dialect = sparksql
templater = dbt
max_line_length = 120
indent_unit = space

[sqlfluff:indentation]
tab_space_size = 4

[sqlfluff:layout:type:comma]
line_position = trailing

[sqlfluff:rules:capitalisation.keywords]
capitalisation_policy = lower

[sqlfluff:rules:capitalisation.identifiers]
capitalisation_policy = lower

[sqlfluff:rules:capitalisation.functions]
extended_capitalisation_policy = lower

[sqlfluff:rules:capitalisation.literals]
capitalisation_policy = lower

[sqlfluff:rules:aliasing.table]
aliasing = explicit

[sqlfluff:rules:aliasing.column]
aliasing = explicit

[sqlfluff:rules:aliasing.length]
min_alias_length = 3

[sqlfluff:rules:convention.select_trailing_comma]
select_clause_trailing_comma = forbid
