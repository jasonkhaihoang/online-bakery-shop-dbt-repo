version: 2

unit_tests:

  # ── Staging layer ──────────────────────────────────────────────────────────

  - name: stg_order_items__refund_defaults_to_zero
    description: >
      When refunded_amount is absent (null) in the source, the staging model
      must coerce it to 0 so downstream models never encounter nulls.
    model: stg_bakery__order_items
    given:
      - input: source('bakery', 'brz_order_items')
        rows:
          - {order_item_id: 1, order_id: 10, product_id: 1, quantity: 2, unit_price: 5.00, refunded_amount: null}
          - {order_item_id: 2, order_id: 10, product_id: 2, quantity: 1, unit_price: 3.00, refunded_amount: 1.50}
    expect:
      rows:
        - {order_item_id: 1, refunded_amount: 0.00, gross_line_total: 10.00, net_line_total: 10.00}
        - {order_item_id: 2, refunded_amount: 1.50, gross_line_total: 3.00,  net_line_total: 1.50}

  - name: stg_order_items__net_line_total_deducts_refund
    description: >
      net_line_total = gross_line_total - refunded_amount. Validates the
      arithmetic is correct for a full refund and a partial refund.
    model: stg_bakery__order_items
    given:
      - input: source('bakery', 'brz_order_items')
        rows:
          # full refund
          - {order_item_id: 3, order_id: 11, product_id: 1, quantity: 1, unit_price: 6.50, refunded_amount: 6.50}
          # partial refund
          - {order_item_id: 4, order_id: 11, product_id: 2, quantity: 2, unit_price: 3.25, refunded_amount: 3.25}
    expect:
      rows:
        - {order_item_id: 3, gross_line_total: 6.50, net_line_total: 0.00}
        - {order_item_id: 4, gross_line_total: 6.50, net_line_total: 3.25}

  # ── Intermediate layer ─────────────────────────────────────────────────────

  - name: int_revenue_by_category__excludes_non_qualifying_statuses
    description: >
      Orders with status 'placed', 'processing', or 'cancelled' must be
      filtered out. Only 'completed' and 'shipped' orders should appear.
    model: int_orders__revenue_by_category
    given:
      - input: ref('stg_bakery__orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: '2024-02-01', status: 'completed',   total_amount: 10.00}
          - {order_id: 2, customer_id: 2, order_date: '2024-02-02', status: 'shipped',     total_amount: 8.00}
          - {order_id: 3, customer_id: 3, order_date: '2024-02-03', status: 'cancelled',   total_amount: 5.00}
          - {order_id: 4, customer_id: 4, order_date: '2024-02-04', status: 'processing',  total_amount: 12.00}
          - {order_id: 5, customer_id: 5, order_date: '2024-02-05', status: 'placed',      total_amount: 7.00}
      - input: ref('stg_bakery__order_items')
        rows:
          - {order_item_id: 10, order_id: 1, product_id: 1, quantity: 1, unit_price: 10.00, refunded_amount: 0, gross_line_total: 10.00, net_line_total: 10.00}
          - {order_item_id: 11, order_id: 2, product_id: 2, quantity: 1, unit_price: 8.00,  refunded_amount: 0, gross_line_total: 8.00,  net_line_total: 8.00}
          - {order_item_id: 12, order_id: 3, product_id: 1, quantity: 1, unit_price: 5.00,  refunded_amount: 0, gross_line_total: 5.00,  net_line_total: 5.00}
          - {order_item_id: 13, order_id: 4, product_id: 2, quantity: 1, unit_price: 12.00, refunded_amount: 0, gross_line_total: 12.00, net_line_total: 12.00}
          - {order_item_id: 14, order_id: 5, product_id: 1, quantity: 1, unit_price: 7.00,  refunded_amount: 0, gross_line_total: 7.00,  net_line_total: 7.00}
      - input: ref('stg_bakery__products')
        rows:
          - {product_id: 1, product_name: 'Sourdough Loaf', category: 'bread', price: 6.50, is_active: true}
          - {product_id: 2, product_name: 'Croissant',      category: 'pastry', price: 3.25, is_active: true}
    expect:
      rows:
        - {order_item_id: 10, status: 'completed'}
        - {order_item_id: 11, status: 'shipped'}

  - name: int_revenue_by_category__excludes_zero_and_negative_net_line_total
    description: >
      Line items with net_line_total <= 0 (fully refunded or cancelled)
      must be excluded from the intermediate model.
    model: int_orders__revenue_by_category
    given:
      - input: ref('stg_bakery__orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: '2024-02-01', status: 'completed', total_amount: 10.00}
      - input: ref('stg_bakery__order_items')
        rows:
          # net > 0 — should pass through
          - {order_item_id: 1, order_id: 1, product_id: 1, quantity: 2, unit_price: 5.00, refunded_amount: 0, gross_line_total: 10.00, net_line_total: 10.00}
          # fully refunded — should be excluded
          - {order_item_id: 2, order_id: 1, product_id: 2, quantity: 1, unit_price: 3.25, refunded_amount: 3.25, gross_line_total: 3.25, net_line_total: 0.00}
      - input: ref('stg_bakery__products')
        rows:
          - {product_id: 1, product_name: 'Sourdough Loaf', category: 'bread',  price: 6.50, is_active: true}
          - {product_id: 2, product_name: 'Croissant',      category: 'pastry', price: 3.25, is_active: true}
    expect:
      rows:
        - {order_item_id: 1, net_line_total: 10.00}

  - name: int_revenue_by_category__excludes_null_category_products
    description: >
      Products with a null category must not appear in the intermediate model.
      The inner join to products already handles this, but the test makes the
      exclusion explicit.
    model: int_orders__revenue_by_category
    given:
      - input: ref('stg_bakery__orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: '2024-02-01', status: 'completed', total_amount: 10.00}
      - input: ref('stg_bakery__order_items')
        rows:
          - {order_item_id: 1, order_id: 1, product_id: 1, quantity: 1, unit_price: 10.00, refunded_amount: 0, gross_line_total: 10.00, net_line_total: 10.00}
          - {order_item_id: 2, order_id: 1, product_id: 99, quantity: 1, unit_price: 5.00, refunded_amount: 0, gross_line_total: 5.00,  net_line_total: 5.00}
      - input: ref('stg_bakery__products')
        rows:
          - {product_id: 1,  product_name: 'Sourdough Loaf',    category: 'bread', price: 6.50, is_active: true}
          # product_id 99 has null category — should be excluded via WHERE category IS NOT NULL
          - {product_id: 99, product_name: 'Unknown Product',   category: null,    price: 5.00, is_active: true}
    expect:
      rows:
        - {order_item_id: 1, product_category: 'bread'}

  # ── Mart layer ─────────────────────────────────────────────────────────────

  - name: mart_revenue__mom_growth_null_for_new_category
    description: >
      When a product category appears for the first time in a given month,
      revenue_mom_growth must be null (not 0, not an error).
    model: fct_revenue_by_category_monthly
    given:
      - input: ref('int_orders__revenue_by_category')
        rows:
          # 'cake' only appears in Feb — no prior month, MoM must be null.
          - {order_item_id: 1, order_id: 1, customer_id: 1, product_id: 7, order_date: '2024-02-01', status: 'completed', product_name: 'Birthday Cake', product_category: 'cake', quantity: 1, unit_price: 45.00, refunded_amount: 0, gross_line_total: 45.00, net_line_total: 45.00}
          # 'bread' appears in both Jan and Feb — Feb should have a non-null MoM.
          - {order_item_id: 2, order_id: 2, customer_id: 2, product_id: 1, order_date: '2024-01-05', status: 'completed', product_name: 'Sourdough Loaf', product_category: 'bread', quantity: 1, unit_price: 6.50, refunded_amount: 0, gross_line_total: 6.50, net_line_total: 6.50}
          - {order_item_id: 3, order_id: 3, customer_id: 3, product_id: 1, order_date: '2024-02-10', status: 'completed', product_name: 'Sourdough Loaf', product_category: 'bread', quantity: 2, unit_price: 6.50, refunded_amount: 0, gross_line_total: 13.00, net_line_total: 13.00}
    expect:
      rows:
        - {product_category: 'cake',  revenue_month: '2024-02-01', revenue_mom_growth: null}
        - {product_category: 'bread', revenue_month: '2024-01-01', revenue_mom_growth: null}
        - {product_category: 'bread', revenue_month: '2024-02-01', revenue_mom_growth: 100.00}

  - name: mart_revenue__metrics_computed_correctly
    description: >
      Validates that total_revenue, order_count, and avg_order_value are
      aggregated correctly for a simple two-order, one-category scenario.
      Two orders in Feb 2024 for 'bread': order A = 10.00, order B = 6.50.
    model: fct_revenue_by_category_monthly
    given:
      - input: ref('int_orders__revenue_by_category')
        rows:
          # Order A: two line items, same category
          - {order_item_id: 1, order_id: 100, customer_id: 1, product_id: 1, order_date: '2024-02-01', status: 'completed', product_name: 'Sourdough Loaf', product_category: 'bread', quantity: 1, unit_price: 6.50,  refunded_amount: 0, gross_line_total: 6.50,  net_line_total: 6.50}
          - {order_item_id: 2, order_id: 100, customer_id: 1, product_id: 3, order_date: '2024-02-01', status: 'completed', product_name: 'Whole Wheat',    product_category: 'bread', quantity: 1, unit_price: 3.50,  refunded_amount: 0, gross_line_total: 3.50,  net_line_total: 3.50}
          # Order B: single line item
          - {order_item_id: 3, order_id: 101, customer_id: 2, product_id: 1, order_date: '2024-02-15', status: 'completed', product_name: 'Sourdough Loaf', product_category: 'bread', quantity: 1, unit_price: 6.50,  refunded_amount: 0, gross_line_total: 6.50,  net_line_total: 6.50}
    expect:
      rows:
        # total_revenue = 6.50 + 3.50 + 6.50 = 16.50
        # order_count   = 2 (order 100 + order 101)
        # avg_order_value = 16.50 / 2 = 8.25
        - {product_category: 'bread', revenue_month: '2024-02-01', total_revenue: 16.50, order_count: 2, avg_order_value: 8.25}

  - name: mart_revenue__multi_category_order_split_correctly
    description: >
      An order containing line items across multiple categories must contribute
      to each category independently. The order_count for each category should
      be 1 (same order_id).
    model: fct_revenue_by_category_monthly
    given:
      - input: ref('int_orders__revenue_by_category')
        rows:
          # Single order with bread and cake items
          - {order_item_id: 1, order_id: 200, customer_id: 1, product_id: 1, order_date: '2024-03-01', status: 'completed', product_name: 'Sourdough Loaf', product_category: 'bread', quantity: 1, unit_price: 6.50, refunded_amount: 0, gross_line_total: 6.50, net_line_total: 6.50}
          - {order_item_id: 2, order_id: 200, customer_id: 1, product_id: 7, order_date: '2024-03-01', status: 'completed', product_name: 'Birthday Cake', product_category: 'cake',  quantity: 1, unit_price: 45.00, refunded_amount: 0, gross_line_total: 45.00, net_line_total: 45.00}
    expect:
      rows:
        - {product_category: 'bread', revenue_month: '2024-03-01', total_revenue: 6.50,  order_count: 1, avg_order_value: 6.50}
        - {product_category: 'cake',  revenue_month: '2024-03-01', total_revenue: 45.00, order_count: 1, avg_order_value: 45.00}

  - name: mart_revenue__partial_refund_deducted_from_revenue
    description: >
      A partially refunded line item must have its refunded amount deducted
      from total_revenue. The order must still be counted (it is not excluded).
    model: fct_revenue_by_category_monthly
    given:
      - input: ref('int_orders__revenue_by_category')
        rows:
          # Line item with a partial refund of 2.00 on a 6.50 item
          - {order_item_id: 1, order_id: 300, customer_id: 1, product_id: 1, order_date: '2024-04-01', status: 'completed', product_name: 'Sourdough Loaf', product_category: 'bread', quantity: 1, unit_price: 6.50, refunded_amount: 2.00, gross_line_total: 6.50, net_line_total: 4.50}
    expect:
      rows:
        - {product_category: 'bread', revenue_month: '2024-04-01', total_revenue: 4.50, order_count: 1, avg_order_value: 4.50}
