version: 2

models:
  - name: stg_bakery__order_items
    description: >
      Cleaned and typed order line items with refund deduction support.
      Grain: one row per order line item.
      refund_amount defaults to 0 until the source exposes a refund column;
      this ensures partial-refund deductions are handled without full order exclusions.
    columns:
      - name: order_item_id
        description: Primary key — unique identifier for each line item.
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: Foreign key to stg_bakery__orders.
        data_tests:
          - not_null
      - name: product_id
        description: Foreign key to stg_bakery__products.
        data_tests:
          - not_null
      - name: quantity
        description: Number of units ordered for this line item.
        data_tests:
          - not_null
      - name: unit_price
        description: Price per unit at time of order.
        data_tests:
          - not_null
      - name: refund_amount
        description: >
          Amount refunded against this line item. Defaults to 0 if the source does
          not yet expose a refund column. Must be >= 0.
        data_tests:
          - not_null
