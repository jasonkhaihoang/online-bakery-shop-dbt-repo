version: 2

models:
  - name: dim_product
    description: >
      Product dimension including active and retired products.
      Filter on is_active = true to restrict to the current catalogue.
      Grain: one row per product.
    config:
      contract:
        enforced: true
      meta:
        domain: sales
        owner: data-eng
        pii: false
        tier: 1
    columns:
      - name: product_id
        description: Unique product identifier.
        data_type: integer
        tests:
          - not_null
          - unique
      - name: product_name
        description: Display name of the product.
        data_type: text
        tests:
          - not_null
      - name: category
        description: Product category (bread, pastry, cake, drink).
        data_type: text
        tests:
          - not_null
          - accepted_values:
              values: ['bread', 'pastry', 'cake', 'drink']
      - name: price
        description: Current list price.
        data_type: numeric
        tests:
          - not_null
      - name: is_active
        description: False for retired products.
        data_type: boolean
        tests:
          - not_null
