version: 2

models:
  - name: fct_revenue
    description: >
      Order-level revenue facts. Includes only completed orders.
      Revenue is recognised at order completion per domain business rules.
      Grain: one row per completed order.
    config:
      contract:
        enforced: true
      meta:
        domain: sales
        owner: data-eng
        pii: false
        tier: 1
    columns:
      - name: order_id
        description: Unique identifier for the completed order.
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Foreign key to dim_customer.
        data_type: integer
        data_tests:
          - not_null
      - name: order_date
        description: Date the order was placed.
        data_type: date
        data_tests:
          - not_null
      - name: total_items
        description: Number of distinct line items in the order.
        data_type: bigint
        data_tests:
          - not_null
      - name: total_units
        description: Sum of quantities across all line items.
        data_type: bigint
        data_tests:
          - not_null
      - name: order_revenue
        description: Total revenue for the order (sum of quantity * unit_price).
        data_type: numeric
        data_tests:
          - not_null
