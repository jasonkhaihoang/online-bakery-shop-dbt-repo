version: 2

models:
  - name: int_orders__completed
    description: >
      Completed orders with line item detail and revenue contribution.
      Business rule: only orders with status 'completed' are included.
      Grain: one row per order line item.
    columns:
      - name: order_item_id
        description: Primary key.
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: Foreign key to the parent order.
        data_tests:
          - not_null
      - name: customer_id
        description: Foreign key to the customer.
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: order_date
        data_tests:
          - not_null
      - name: status
        description: Always 'completed' in this model by construction.
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed']
      - name: product_name
      - name: category
      - name: quantity
        data_tests:
          - not_null
      - name: unit_price
        data_tests:
          - not_null
      - name: line_total
        description: Revenue contribution of this line item (quantity * unit_price).
        data_tests:
          - not_null
