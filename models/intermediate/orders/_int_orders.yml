version: 2

models:
  - name: int_orders__completed
    description: >
      Completed orders with line item detail and revenue contribution.
      Business rule: only orders with status 'completed' are included.
      Grain: one row per order line item.
    columns:
      - name: order_item_id
        description: Primary key.
        tests:
          - not_null
          - unique
      - name: order_id
        description: Foreign key to the parent order.
        tests:
          - not_null
      - name: customer_id
        description: Foreign key to the customer.
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: status
        tests:
          - not_null
      - name: product_name
      - name: category
      - name: quantity
        tests:
          - not_null
      - name: unit_price
        tests:
          - not_null
      - name: line_total
        description: Revenue contribution of this line item (quantity * unit_price).
        tests:
          - not_null
